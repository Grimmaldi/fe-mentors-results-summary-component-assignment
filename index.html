<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Document</title>
</head>
<body>
    <main class="container">
        <section class="results">
            <h2>Your Result</h2>
            <div class="user-result">
                <p id="score">76</p>
                <p>of 100</p>
            </div>
            <div class="evaluation">
                <p class="eval-level">Great</p>
                <p>You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </section>
        <section class="summary">
            <h2>Summary</h2>
            <ul>
                <li><div class="sum-banner" id="reaction"><img src="./assets/images/icon-reaction.svg" alt="Reaction icon">Reaction</div></li>
                <li><div class="sum-banner" id="memory"><img src="./assets/images/icon-memory.svg" alt="Memory icon">Memory</div></li>
                <li><div class="sum-banner" id="verbal"><img src="./assets/images/icon-verbal.svg" alt="Verbal icon">Verbal</div></li>
                <li><div class="sum-banner" id="visual"><img src="./assets/images/icon-visual.svg" alt="Visual icon">Visual</div></li>
            </ul>
            <button>Continue</button>
        </section>
    </main>
</body>
</html>
