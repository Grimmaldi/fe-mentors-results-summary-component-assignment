<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Document</title>
</head>
<body>
    <main class="container">
        <section class="results">
            <h2>Your Result</h2>
            <div class="user-result">
                <p id="score"><span id=score-value>76</span><br>of 100</p>
            </div>
            <div class="evaluation">
                <p class="eval-level">Great</p>
                <p>You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </section>
        <section class="summary">
            <h2>Summary</h2>
            <ul>
                <li>
                    <div class="sum-banner" id="reaction">
                        <div class="sum-banner-category">
                            <img src="./assets/images/icon-reaction.svg" alt="Reaction icon">Reaction
                        </div>
                        <div class="sum-banner-score"><strong>80</strong> / 100</div>
                    </div>
                </li>
                <li>
                    <div class="sum-banner" id="memory">
                        <div class="sum-banner-category">
                            <img src="./assets/images/icon-memory.svg" alt="Memory icon">Memory
                        </div>
                        <div class="sum-banner-score"><strong>92</strong> / 100</div>
                    </div>
                </li>
                <li>
                    <div class="sum-banner" id="verbal">
                        <div class="sum-banner-category">
                            <img src="./assets/images/icon-verbal.svg" alt="Verbal icon">Verbal
                        </div>
                        <div class="sum-banner-score"><strong>61</strong> / 100</div>
                    </div>
                </li>
                <li>
                    <div class="sum-banner" id="visual">
                        <div class="sum-banner-category">
                            <img src="./assets/images/icon-visual.svg" alt="Visual icon">Visual
                        </div>
                        <div class="sum-banner-score"><strong>73</strong> / 100</div>
                    </div>
                </li>
            </ul>
            <button>Continue</button>
        </section>
    </main>
</body>
</html>
